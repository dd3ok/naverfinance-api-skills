name: Naver Finance API Skills CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run selftest
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/selftest.py
